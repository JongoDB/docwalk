# LiteLLM configuration for DocWalk's free AI tier
#
# Routes requests from the DocWalk CLI through Groq's free tier.
# Exposed to the internet via Cloudflare tunnel at ai.docwalk.dev.
#
# Groq free tier limits are per-model, so we rotate across 7 reliable models.
# kimi-k2 and gpt-oss removed — frequently return 503/empty responses.
#   Combined: ~210 RPM, ~200K TPM
#
# Usage:
#   1. Set GROQ_API_KEY env var
#   2. Start the stack: docker-compose up
#   3. Configure Cloudflare tunnel to point ai.docwalk.dev → localhost:4000

model_list:
  - model_name: docwalk-default
    litellm_params:
      model: groq/meta-llama/llama-4-scout-17b-16e-instruct
      api_key: os.environ/GROQ_API_KEY
  - model_name: docwalk-default
    litellm_params:
      model: groq/groq/compound
      api_key: os.environ/GROQ_API_KEY
  - model_name: docwalk-default
    litellm_params:
      model: groq/groq/compound-mini
      api_key: os.environ/GROQ_API_KEY
  - model_name: docwalk-default
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  - model_name: docwalk-default
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: os.environ/GROQ_API_KEY
  - model_name: docwalk-default
    litellm_params:
      model: groq/meta-llama/llama-4-maverick-17b-128e-instruct
      api_key: os.environ/GROQ_API_KEY
  - model_name: docwalk-default
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

general_settings:
  master_key: sk-docwalk-master  # override via LITELLM_MASTER_KEY env var
  database_url: postgresql://litellm:litellm@postgres:5432/litellm

litellm_settings:
  drop_params: true       # ignore unsupported params gracefully
  request_timeout: 30     # Groq is fast, no need for long timeouts
