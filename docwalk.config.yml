source:
  repo: "."
  branch: master
  include:
    - "src/**"
  exclude:
    - "node_modules/**"
    - "dist/**"
    - ".git/**"
    - "**/*.test.*"
  languages: auto
  provider: local

analysis:
  depth: full
  ai_summaries: true
  ai_provider:
    name: openai
    model: meta-llama/llama-4-scout-17b-16e-instruct
    api_key_env: GROQ_API_KEY
    base_url: "https://api.groq.com/openai/v1"
  insights: true
  insights_ai: true
  dependency_graph: true
  changelog: false
  max_file_size: 500000
  concurrency: 3

deploy:
  provider: gh-pages

theme:
  preset: developer
